default_language_version:
  python: python312

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (local)
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        require_serial: true

      - id: ruff-check
        name: ruff-check (local)
        entry: ruff check
        language: system
        types: [python]
        require_serial: true

      - id: ruff-format
        name: ruff-format (local)
        entry: ruff format
        language: system
        types: [python]
        require_serial: true